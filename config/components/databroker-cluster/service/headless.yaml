apiVersion: v1
kind: Service
metadata:
  name: pomerium-headless
  labels:
    app.kubernetes.io/name: pomerium
    app.kubernetes.io/component: proxy
spec:
  publishNotReadyAddresses: true
  clusterIP: None
  ports:
    - port: 5443
      name: grpc
    - port: 5999
      name: raft
  selector:
    app.kubernetes.io/name: pomerium
    app.kubernetes.io/component: proxy
